name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The station bundle is generated, not committed — the licence filter that
      # decides what ships has to run on every build, not once on a laptop.
      # Build before test: the bundle check (src/bundle.test.ts) needs a dist/
      # to inspect, or it would vacuously pass on a page that never got built.
      - run: npm run build
      - run: npm test
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - run: npm run smoke
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
